<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hussam Alshawi - Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const userPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

            if (savedTheme === 'dark' || (!savedTheme && userPrefersDark)) {
                document.documentElement.classList.add('dark');
                document.documentElement.classList.remove('light');
            } else {
                document.documentElement.classList.remove('dark');
                document.documentElement.classList.add('light');
            }
        })();
    </script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { darkBg: '#050a18', darkCard: '#0b1426', accentBlue: '#00d2ff' } } }
        }
    </script>
</head>
<body class="bg-[#f8fafc] dark:bg-darkBg text-slate-800 dark:text-white transition-all duration-500 font-sans">

    <nav class="fixed w-full z-50 px-6 md:px-10 py-4 bg-white/80 dark:bg-darkBg/80 backdrop-blur-md border-b dark:border-slate-800">
    <div class="max-w-7xl mx-auto flex justify-between items-center">

        <div class="flex-1">
            <div class="text-xl font-black text-blue-600 dark:text-accentBlue uppercase tracking-tighter">
                Hussam Alshawi
            </div>
        </div>

        <div class="hidden md:flex flex-1 justify-center items-center space-x-8 text-sm font-bold uppercase tracking-wide">
            <a href="/" class="hover:text-blue-500 transition-colors">Home</a>
            <a href="#projects" class="hover:text-blue-500 transition-colors">Projects</a>
            <a href="#blog" class="hover:text-blue-500 transition-colors">Blog</a>
        </div>

        <div class="flex-1 flex justify-end items-center space-x-4">
            <div class="flex items-center gap-2 border-r dark:border-slate-700 pr-4 mr-2">
                <a href="?lang=ar" class="text-[10px] font-bold hover:text-blue-500 transition">AR</a>
                <span class="text-slate-300">|</span>
                <a href="?lang=en" class="text-[10px] font-bold text-blue-500 transition">EN</a>
            </div>

            <button onclick="toggleTheme()" class="p-2 rounded-full bg-slate-100 dark:bg-slate-800 text-yellow-500 dark:text-yellow-300 hover:scale-110 transition">
                <i id="theme-icon" class="fas fa-moon"></i>
            </button>

            <button class="hidden sm:block bg-blue-600 text-white px-5 py-2 rounded-full text-xs font-bold hover:bg-blue-700 transition">
                Contact
            </button>

            <button id="mobile-menu-button" class="md:hidden text-slate-600 dark:text-slate-300 p-2">
                <i class="fas fa-bars text-xl"></i>
            </button>
        </div>
    </div>

    <div id="mobile-menu" class="absolute top-full left-0 w-full bg-white dark:bg-darkBg border-b dark:border-slate-800 hidden flex-col p-8 space-y-6 shadow-2xl md:hidden text-center animate-fade-in">
        <a href="/" class="text-lg font-bold">Home</a>
        <a href="#projects" class="text-lg font-bold">Projects</a>
        <a href="#blog" class="text-lg font-bold">Blog</a>
        <div class="h-[1px] bg-slate-100 dark:bg-slate-800 w-full"></div>
        <div class="flex justify-center space-x-4 font-bold">
            <a href="?lang=ar">العربية</a>
            <span class="text-slate-300">|</span>
            <a href="?lang=en">English</a>
        </div>
    </div>
</nav>

    {% block content %}{% endblock %}
    <footer class="py-12 text-center text-slate-400 text-xs uppercase tracking-widest">
    <p>&copy; 2026 Hussam Alshawi - Built with Python & Integrity</p>
</footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
