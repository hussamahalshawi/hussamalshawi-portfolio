<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
    {% block title %} HussamAlshawi-Portfolio {% endblock %}
</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const userPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

            if (savedTheme === 'dark' || (!savedTheme && userPrefersDark)) {
                document.documentElement.classList.add('dark');
                document.documentElement.classList.remove('light');
            } else {
                document.documentElement.classList.remove('dark');
                document.documentElement.classList.add('light');
            }
        })();
    </script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { darkBg: '#050a18', darkCard: '#0b1426', accentBlue: '#00d2ff' } } }
        }
    </script>
</head>
<body class="bg-[#f8fafc] dark:bg-darkBg text-slate-800 dark:text-white transition-all duration-500 font-sans flex flex-col min-h-screen">

<nav class="fixed w-full z-50 px-6 md:px-10 py-4 bg-white/80 dark:bg-darkBg/80 backdrop-blur-md border-b dark:border-slate-800">
    <div class="max-w-7xl mx-auto flex justify-between items-center">

        <div class="flex-1">
            <div class="text-xl font-black text-blue-600 dark:text-accentBlue uppercase tracking-tighter">
                Hussam Alshawi
            </div>
        </div>

        <div class="hidden md:flex flex-1 justify-center items-center space-x-8 text-sm font-bold uppercase tracking-wide">
            <a href="/" class="hover:text-blue-500 transition-colors">Home</a>
            <a href="{{ url_for('portfolio.all_projects') }}" class="hover:text-blue-500 transition-colors">Projects</a>
        </div>

        <div class="flex-1 flex justify-end items-center space-x-4">
            <div class="flex items-center gap-2 border-r dark:border-slate-700 pr-4 mr-2">
                <a href="?ar" class="text-[10px] font-bold hover:text-blue-500 transition">AR</a>
                <span class="text-slate-300">|</span>
                <a href="?en" class="text-[10px] font-bold text-blue-500 transition">EN</a>
            </div>

            <button onclick="toggleTheme()"
                    class="p-2 rounded-full bg-slate-100 dark:bg-slate-800 text-yellow-500 dark:text-yellow-300 hover:scale-110 transition">
                <i id="theme-icon" class="fas fa-moon"></i>
            </button>

            <button class="hidden sm:block bg-blue-600 text-white px-5 py-2 rounded-full text-xs font-bold hover:bg-blue-700 transition">
                Contact
            </button>

            <button id="mobile-menu-button" class="md:hidden text-slate-600 dark:text-slate-300 p-2">
                <i class="fas fa-bars text-xl"></i>
            </button>
        </div>
    </div>

    <div id="mobile-menu"
         class="absolute top-full left-0 w-full bg-white dark:bg-darkBg border-b dark:border-slate-800 hidden flex-col p-8 space-y-6 shadow-2xl md:hidden text-center animate-fade-in">
        <a href="/" class="text-lg font-bold">Home</a>
        <a href="{{ url_for('portfolio.all_projects') }}" class="text-lg font-bold">Projects</a>

    </div>
</nav>

<main class="flex-grow">
        {% block content %}{% endblock %}
    </main>

    <footer class="py-12 mt-auto text-center text-slate-400 text-xs uppercase tracking-widest border-t dark:border-slate-800/50">
        <p>&copy; 2026 Hussam Alshawi - Built with Python & Integrity</p>
    </footer>
<div class="fixed bottom-6 right-6 z-[100]">
    <button onclick="openFeedbackModal()"
            class="w-14 h-14 bg-blue-600 hover:bg-blue-700 text-white rounded-full shadow-[0_10px_30px_rgba(37,99,235,0.4)] flex items-center justify-center transition-all duration-300 hover:scale-110 group">
        <i class="fas fa-comment-dots text-xl group-hover:rotate-12"></i>
        <span class="absolute inset-0 rounded-full bg-blue-500 animate-ping opacity-20"></span>
    </button>
</div>

<div id="feedback-toast-container" class="fixed bottom-24 right-6 z-[99] flex flex-col gap-4 pointer-events-none">
    </div>
<script>
    // الطريقة الصحيحة والمباشرة لحقن JSON من Flask إلى JS
    // لا تضع علامات تنصيص '' حول القوسين
    const feedbacks = {{ feedbacks_json | safe if feedbacks_json else '[]' }};

    console.log("Check this out - Feedbacks from Server:", feedbacks);

    let feedbackIndex = 0;

    function showNextFeedback() {
        if (!feedbacks || feedbacks.length === 0) {
            console.warn("Notification system: Empty feedback list.");
            return;
        }

        const feedback = feedbacks[feedbackIndex];
        const container = document.getElementById('feedback-toast-container');
        if (!container) return;

        const toast = document.createElement('div');
        // استعمل الـ Classes الخاصة بك هنا...
        toast.className = "flex items-center gap-4 p-4 bg-white dark:bg-slate-900 shadow-2xl rounded-2xl border border-slate-200 dark:border-slate-800 transition-all duration-1000 opacity-0 translate-y-10 w-72 md:w-80 pointer-events-auto";

        toast.innerHTML = `
            <div class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center flex-shrink-0">
                <span class="text-white text-[10px] font-black">${feedback.person_name ? feedback.person_name.charAt(0) : 'U'}</span>
            </div>
            <div class="flex-1">
                <p class="text-[10px] font-black dark:text-white uppercase">${feedback.person_name}</p>
                <p class="text-[9px] text-slate-500 italic mt-1">"${feedback.feedback_text}"</p>
            </div>
        `;

        container.appendChild(toast);
        setTimeout(() => toast.classList.remove('opacity-0', 'translate-y-10'), 100);
        setTimeout(() => {
            toast.classList.add('opacity-0', '-translate-y-20');
            setTimeout(() => toast.remove(), 1000);
        }, 5000);

        feedbackIndex = (feedbackIndex + 1) % feedbacks.length;
        setTimeout(showNextFeedback, 8000);
    }

    window.addEventListener('load', () => {
        if (feedbacks.length > 0) {
            setTimeout(showNextFeedback, 2000);
        }
    });
</script>
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
